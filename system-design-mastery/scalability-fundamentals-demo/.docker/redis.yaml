# Redis dùng làm shared state store cho stateless demo
# (EN: Redis used as shared state store for the stateless demo)
#
# Run command:
# docker compose -f .docker/redis.yaml up --build -d

services:
  redis:
    image: docker.io/redis:7-alpine
    container_name: scalability-fundamentals-redis
    ports:
      - '6379:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data

volumes:
  redis-data:
