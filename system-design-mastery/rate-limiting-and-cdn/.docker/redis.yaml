# Redis cho Throttler storage (counter sliding window)
# (EN: Redis for Throttler storage — sliding window counters)
#
# Run command:
# docker compose -f .docker/redis.yaml up --build -d

services:
  redis:
    image: docker.io/redis:7-alpine
    container_name: rate-limit-redis
    ports:
      - '6379:6379'
