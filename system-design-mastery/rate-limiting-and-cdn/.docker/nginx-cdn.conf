# Nginx giả lập CDN edge: cache static assets với TTL
# (EN: Nginx simulating CDN edge — cache static assets with TTL)

events { worker_connections 1024; }

http {
  # Zone cache lưu 10m metadata, giữ file tối đa 1h trong thư mục /tmp
  # (EN: cache zone holds 10m metadata, keeps files up to 1h)
  proxy_cache_path /tmp/cdn-cache levels=1:2 keys_zone=cdn_cache:10m max_size=100m inactive=60m;

  upstream origin {
    # Origin server chính là Nest app trên host (EN: origin is the Nest app on host)
    server host.docker.internal:3000;
  }

  server {
    listen 80;

    # Cache /static/* với TTL 1 phút
    # (EN: cache /static/* with 1 minute TTL)
    location /static/ {
      proxy_pass http://origin;

      proxy_cache cdn_cache;
      proxy_cache_valid 200 1m;
      proxy_cache_use_stale error timeout updating;

      # Header giúp debug HIT/MISS (EN: header for debugging HIT/MISS)
      add_header X-Cache-Status $upstream_cache_status;
    }

    # Dynamic API không cache
    location / {
      proxy_pass http://origin;
    }
  }
}
