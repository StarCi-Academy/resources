version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: starci-cqrs-write-db
    environment:
      POSTGRES_USER: cqrs_user
      POSTGRES_PASSWORD: cqrs_password
      POSTGRES_DB: cqrs_db
    ports:
      - "5432:5432"
    restart: always

# Run command:
# docker compose -f .docker/postgresql.yaml up --build -d
