# Prometheus config — scrape Nest app + load alert rules + send to Alertmanager
# (EN: Prometheus config — scrape Nest app, load rules, forward to Alertmanager)
global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: 'nest-app'
    static_configs:
      - targets: ['host.docker.internal:3000']
