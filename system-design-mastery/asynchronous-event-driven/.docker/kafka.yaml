# Docker Compose cho Apache Kafka + KRaft (không cần Zookeeper)
# (EN: Docker Compose for Apache Kafka + KRaft — no Zookeeper needed)

services:
  kafka-event-driven:
    image: docker.io/bitnamilegacy/kafka:3.9
    container_name: kafka-event-driven
    ports:
      # Port cho client kết nối từ host (EN: port for client connection from host)
      - "9092:9092"
    environment:
      # Chế độ KRaft — không cần Zookeeper (EN: KRaft mode — no Zookeeper needed)
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka-event-driven:9093
      # Listeners cho giao tiếp nội bộ và bên ngoài
      # (EN: Listeners for internal and external communication)
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      # Tự động tạo topics khi producer gửi message
      # (EN: Auto-create topics when producer sends messages)
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    restart: unless-stopped

# Run command:
# docker compose -f .docker/kafka.yaml up --build -d
