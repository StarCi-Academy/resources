version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: starci-order-db
    environment:
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_password
      POSTGRES_DB: order_db
    ports:
      - "5432:5432"
    restart: always

# Run command:
# docker compose -f .docker/postgresql.yaml up --build -d
