// Protobuf definition cho User Service gRPC
// (EN: Protobuf definition for User Service gRPC)

syntax = "proto3";

package user;

// Service định nghĩa các RPC methods cho User
// (EN: Service defining RPC methods for User)
service UserService {
  // Lấy user theo ID (EN: get user by ID)
  rpc FindOne (UserById) returns (User) {}
  // Lấy danh sách tất cả users (EN: get all users)
  rpc FindAll (Empty) returns (UserList) {}
  // Tạo user mới (EN: create new user)
  rpc Create (CreateUserDto) returns (User) {}
}

message UserById {
  int32 id = 1;
}

message CreateUserDto {
  string name = 1;
  string email = 2;
}

message User {
  int32 id = 1;
  string name = 2;
  string email = 3;
}

message UserList {
  repeated User users = 1;
}

message Empty {}
