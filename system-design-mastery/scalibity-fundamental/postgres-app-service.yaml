# Khai báo API version cho Service (EN: declare API version for Service)
apiVersion: v1
# Loại tài nguyên là Service — expose postgres-app ra ngoài cluster (EN: Service — expose postgres-app outside the cluster)
kind: Service
metadata:
  # Tên Service (EN: Service name)
  name: postgres-app-service
spec:
  # ClusterIP để test demo từ máy host (EN: ClusterIP to test the demo from host)
  type: ClusterIP
  selector:
    # Selector khớp label của Pod trong Deployment (EN: selector matches Pod labels in the Deployment)
    app: postgres-app
  ports:
    - # Cổng Service nội bộ (EN: internal Service port)
      port: 3000
      # Cổng container đích (EN: target container port)
      targetPort: 3000

# Run command:
# kubectl apply -f postgres-app-service.yaml
