# Build + chạy sqlite-app isolate
# (EN: build + run sqlite-app in isolation)
#
# Run command (chạy từ thư mục này):
# docker compose -f docker-compose.yaml up --build -d

services:
  sqlite-app:
    build:
      # Context = monorepo root để Dockerfile copy được libs/ (EN: context = monorepo root)
      context: ../..
      dockerfile: apps/sqlite-app/Dockerfile
    image: starci183/scalibity-sqlite-app:latest
    container_name: scalibity-sqlite-app
    environment:
      PORT: '3000'
      SQLITE_PATH: /data/notes.db
    volumes:
      - sqlite-data:/data
    ports:
      - '3001:3000'

volumes:
  sqlite-data:
