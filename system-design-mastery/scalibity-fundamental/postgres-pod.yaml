# Khai báo API version cho Pod (EN: declare API version for Pod resource)
apiVersion: v1
# Loại tài nguyên là Pod — chạy Postgres đơn lẻ cho demo (EN: resource type is Pod — single Postgres for demo)
kind: Pod
metadata:
  # Tên Pod — Kubernetes DNS resolve qua Service, không phải Pod name (EN: Pod name — K8s DNS resolves via Service, not Pod name)
  name: postgres-pod
  labels:
    # Label để Service selector match đúng Pod này (EN: label for Service selector to match this Pod)
    app: postgres
spec:
  containers:
    - # Tên container bên trong Pod (EN: container name inside the Pod)
      name: postgres
      # Image Postgres chính thức từ Docker Hub (EN: official Postgres image from Docker Hub)
      image: postgres:16-alpine
      ports:
        - # Cổng mặc định Postgres (EN: default Postgres port)
          containerPort: 5432
      env:
        - # User mặc định (EN: default superuser)
          name: POSTGRES_USER
          value: postgres
        - # Mật khẩu (EN: password)
          name: POSTGRES_PASSWORD
          value: postgres
        - # Tạo sẵn database khi container boot (EN: pre-create database on boot)
          name: POSTGRES_DB
          value: notes

# Run command:
# kubectl apply -f postgres-pod.yaml
