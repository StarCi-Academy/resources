# Khai báo API version cho Service (EN: declare API version for Service resource)
apiVersion: v1
# Loại tài nguyên là Service — tạo DNS nội bộ cho Postgres Pod (EN: resource type is Service — create internal DNS for Postgres Pod)
kind: Service
metadata:
  # Tên Service — app kết nối qua: postgres-service.default.svc.cluster.local (EN: Service name — apps connect via postgres-service.default.svc.cluster.local)
  name: postgres-service
spec:
  # ClusterIP — chỉ truy cập từ bên trong cluster (EN: ClusterIP — internal only)
  type: ClusterIP
  selector:
    # Selector khớp với label của Postgres Pod (EN: selector matches Postgres Pod label)
    app: postgres
  ports:
    - # Cổng Service map sang cổng Postgres container (EN: Service port mapped to Postgres container port)
      port: 5432
      targetPort: 5432

# Run command:
# kubectl apply -f postgres-service.yaml
