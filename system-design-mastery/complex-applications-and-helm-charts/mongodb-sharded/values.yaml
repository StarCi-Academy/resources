# Cấu hình Helm chart MongoDB Sharded với image từ bitnamilegacy
# (EN: Helm chart configuration for MongoDB Sharded using bitnamilegacy images)
# Chart: oci://registry-1.docker.io/bitnamicharts/mongodb-sharded
# File gốc: values.origin.yaml

# Override tất cả image từ bitnami/* sang bitnamilegacy/*
# (EN: Override all images from bitnami/* to bitnamilegacy/*)

# Image chính MongoDB Sharded (EN: main MongoDB Sharded image)
image:
  registry: docker.io
  repository: bitnamilegacy/mongodb-sharded
  tag: 8.0.13-debian-12-r0
  pullPolicy: IfNotPresent

# Image cho init container volume-permissions (EN: volume-permissions init container image)
volumePermissions:
  image:
    registry: docker.io
    repository: bitnamilegacy/os-shell
    tag: 12-debian-12-r51
    pullPolicy: IfNotPresent

# Image cho metrics exporter (EN: metrics exporter image)
metrics:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/mongodb-exporter
    tag: 0.47.0-debian-12-r1
    pullPolicy: Always

# Số lượng shard (EN: number of shards)
shards: 2

# Config Server — lưu metadata cluster (EN: Config Server — stores cluster metadata)
configsvr:
  replicaCount: 3

# Mongos — router cho client (EN: Mongos — router for clients)
mongos:
  replicaCount: 2

# Shard data nodes (EN: Shard data nodes)
shardsvr:
  dataNode:
    replicaCount: 3
  persistence:
    enabled: true
    size: 8Gi

# Xác thực (EN: authentication)
auth:
  enabled: true
  rootPassword: "root123"
  replicaSetKey: "replicasetkey123"

# Run command:
# helm upgrade --install mongodb-sharded oci://registry-1.docker.io/bitnamicharts/mongodb-sharded -n database --values values.yaml --wait
