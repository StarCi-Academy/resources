# Docker Compose cho Kong API Gateway (PostgreSQL mode)
# (EN: Docker Compose for Kong API Gateway in PostgreSQL mode)
#
# Kong chạy với PostgreSQL — quản lý cấu hình động qua Admin API
# (EN: Kong runs with PostgreSQL — manage config dynamically via Admin API)
#
# Khác với DB-less mode: không cần file kong.yml, thay vào đó dùng
# Admin API (http://localhost:8001) hoặc Konga/Kong Manager để CRUD
# services, routes, plugins, consumers at runtime.
# (EN: Unlike DB-less mode: no kong.yml needed, use Admin API or
# Konga/Kong Manager to CRUD services/routes/plugins/consumers at runtime)
#
# Luồng khởi động (EN: Startup flow):
#   1. starci-kong-db (PostgreSQL) khởi động và healthy
#   2. kong-migrations chạy `kong migrations bootstrap` tạo schema
#   3. kong gateway khởi động và kết nối tới database

services:
  # =========================
  # PostgreSQL — lưu cấu hình Kong
  # (EN: PostgreSQL — stores Kong configuration)
  # =========================
  starci-kong-db:
    image: docker.io/postgres:12-alpine
    container_name: starci-kong-db
    environment:
      POSTGRES_USER: kong
      POSTGRES_DB: kong
      POSTGRES_PASSWORD: kongpass
    volumes:
      # Persist dữ liệu Kong qua các lần restart (EN: Persist Kong data across restarts)
      - starci-kong-db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      # Kong migrations & gateway chờ database healthy mới chạy
      # (EN: Migrations & gateway wait for database to be healthy)
      test: ["CMD", "pg_isready", "-U", "kong", "-d", "kong"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # =========================
  # Kong Migrations — bootstrap schema cho database
  # (EN: Kong Migrations — bootstrap schema for the database)
  # Container này chạy 1 lần rồi exit (EN: runs once then exits)
  # =========================
  starci-kong-migrations:
    image: docker.io/kong:3.9
    container_name: starci-kong-migrations
    command: kong migrations bootstrap
    depends_on:
      starci-kong-db:
        condition: service_healthy
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: starci-kong-db
      KONG_PG_PORT: 5432
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpass
      KONG_PG_DATABASE: kong
    restart: on-failure
    volumes:
      - starci-kong-migrations-data:/var/lib/postgresql/data

  # =========================
  # Kong Gateway — API Gateway chính
  # (EN: Kong Gateway — main API gateway)
  # =========================
  starci-kong-gateway:
    image: docker.io/kong:3.9
    container_name: starci-kong-gateway
    depends_on:
      starci-kong-db:
        condition: service_healthy
      starci-kong-migrations:
        condition: service_completed_successfully
    environment:
      # Dùng PostgreSQL thay vì DB-less (EN: use PostgreSQL instead of DB-less)
      KONG_DATABASE: postgres
      KONG_PG_HOST: starci-kong-db
      KONG_PG_PORT: 5432
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpass
      KONG_PG_DATABASE: kong
      # Proxy lắng nghe trên port 8000 (EN: proxy listens on port 8000)
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      # Admin API lắng nghe trên port 8001 (EN: admin API listens on port 8001)
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      # Kong Manager GUI trên port 8002 (EN: Kong Manager GUI on port 8002)
      KONG_ADMIN_GUI_LISTEN: "0.0.0.0:8002"
      KONG_ADMIN_GUI_URL: "http://localhost:8002"
      # Log ra stdout để dễ debug (EN: log to stdout for easy debugging)
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
    ports:
      # Port proxy — client gửi request qua đây (EN: Proxy port — clients send requests through this)
      - "8000:8000"
      # Port admin API — quản lý Kong qua REST (EN: Admin API port — manage Kong via REST)
      - "8001:8001"
      # Port Kong Manager — GUI quản trị (EN: Kong Manager port — admin GUI)
      - "8002:8002"
    # Cho phép Kong truy cập services chạy trên host (NestJS :3001, :3002, :3003)
    # (EN: Allow Kong to access services running on host)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # =========================
  # Konga Database — PostgreSQL riêng cho Konga
  # (EN: Konga Database — separate PostgreSQL for Konga)
  # Tách DB để không đụng schema của Kong
  # (EN: Separate DB to avoid clashing with Kong schema)
  # =========================
  starci-konga-db:
    image: docker.io/postgres:11-alpine
    container_name: starci-konga-db
    environment:
      POSTGRES_USER: konga
      POSTGRES_DB: konga
      POSTGRES_PASSWORD: kongapass
    volumes:
      - starci-konga-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "konga", "-d", "konga"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # =========================
  # Konga Migrations — chuẩn bị schema cho Konga DB
  # (EN: Konga Migrations — prepare schema for Konga DB)
  # Chạy 1 lần rồi exit (EN: runs once then exits)
  # =========================
  starci-konga-migrations:
    image: docker.io/pantsel/konga:next
    container_name: starci-konga-migrations
    command: "-c prepare -a postgres -u postgresql://konga:kongapass@starci-konga-db:5432/konga"
    depends_on:
      starci-konga-db:
        condition: service_healthy
    restart: on-failure
    volumes:
      - starci-konga-migrations-data:/var/lib/postgresql/data

  # =========================
  # Konga — GUI quản lý Kong (3rd party)
  # (EN: Konga — Kong admin GUI, 3rd party)
  # Truy cập tại http://localhost:1337
  # (EN: Access at http://localhost:1337)
  # =========================
  starci-konga:
    image: docker.io/pantsel/konga:next
    container_name: starci-konga
    depends_on:
      starci-konga-db:
        condition: service_healthy
      starci-konga-migrations:
        condition: service_completed_successfully
      starci-kong-gateway:
        condition: service_started
    environment:
      # Chế độ production (EN: production mode)
      NODE_ENV: production
      # Kết nối Konga DB để lưu users, connections, snapshots
      # (EN: Connect Konga DB to store users, connections, snapshots)
      DB_ADAPTER: postgres
      DB_HOST: starci-konga-db
      DB_PORT: "5432"
      DB_USER: konga
      DB_PASSWORD: kongapass
      DB_DATABASE: konga
      # Token mã hóa dữ liệu nhạy cảm trong DB
      # (EN: Token to encrypt sensitive data in DB)
      TOKEN_SECRET: "please-change-this-secret-in-production"
      # URL Admin API của Kong để Konga gọi vào
      # (EN: Kong Admin API URL for Konga to call)
      KONGA_HOOK_TIMEOUT: "60000"
    ports:
      - "1337:1337"
    restart: unless-stopped

volumes:
  starci-kong-db-data:
  starci-kong-migrations-data:
  starci-konga-db-data:
  starci-konga-migrations-data:

# Run command:
# docker compose -f .docker/kong.yaml up -d
#
# Sau khi chạy, tạo services & routes qua Admin API (EN: create services & routes via Admin API):
#
#   # User service
#   curl -i -X POST http://localhost:8001/services \
#     --data name=user-service \
#     --data url=http://host.docker.internal:3001
#   curl -i -X POST http://localhost:8001/services/user-service/routes \
#     --data name=user-route \
#     --data paths[]=/users \
#     --data strip_path=false
#
#   # Product service
#   curl -i -X POST http://localhost:8001/services \
#     --data name=product-service \
#     --data url=http://host.docker.internal:3002
#   curl -i -X POST http://localhost:8001/services/product-service/routes \
#     --data name=product-route \
#     --data paths[]=/products \
#     --data strip_path=false
#
#   # Order service
#   curl -i -X POST http://localhost:8001/services \
#     --data name=order-service \
#     --data url=http://host.docker.internal:3003
#   curl -i -X POST http://localhost:8001/services/order-service/routes \
#     --data name=order-route \
#     --data paths[]=/orders \
#     --data strip_path=false
#
# GUI options:
#   - Kong Manager (official): http://localhost:8002
#   - Konga (3rd party):       http://localhost:1337
#
# Setup Konga lần đầu (EN: First-time Konga setup):
#   1. Mở http://localhost:1337, tạo admin account
#      (EN: Open http://localhost:1337, create admin account)
#   2. CONNECTIONS → NEW CONNECTION
#      Name: kong-gateway
#      Kong Admin URL: http://kong:8001
#      (dùng service name trong Docker network, không dùng localhost)
#      (EN: use Docker service name, not localhost)
