# Khai báo API version cho Service (EN: declare API version for Service resource)
apiVersion: v1
# Loại tài nguyên là Service (EN: resource type is Service)
kind: Service
metadata:
  # Tên Service backend (EN: backend Service name)
  name: example-backend-service
spec:
  # Dùng ClusterIP để các Pod/Service khác truy cập nội bộ trong cluster (EN: use ClusterIP for internal access within the cluster)
  type: ClusterIP
  selector:
    # Selector khớp với label của Pod trong Deployment (EN: selector matches Pod labels in the Deployment)
    app: example-backend
  ports:
    - # Cổng Service bên trong cluster (EN: Service port inside the cluster)
      port: 3000
      # Cổng container đích (EN: target container port)
      targetPort: 3000

# Run command:
# kubectl apply -f backend-service.yaml