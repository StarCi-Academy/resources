# Deployment orders-app — 3 replica stateless
# (EN: orders-app Deployment — 3 stateless replicas)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-app
  labels:
    app: orders-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: orders-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: orders-app
    spec:
      containers:
        - name: orders-app
          image: starci183/hsl-orders-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
          readinessProbe:
            httpGet:
              path: /api/orders/healthz
              port: 3002
            initialDelaySeconds: 3
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /api/orders/healthz
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: orders-service
spec:
  type: ClusterIP
  selector:
    app: orders-app
  ports:
    - port: 3002
      targetPort: 3002

# Run command:
# kubectl apply -f orders-app-deployment.yaml
