# Nginx config cho Load Balancer demo
# (EN: Nginx config for the Load Balancer demo)

events {
  worker_connections 1024;
}

http {
  # Upstream gom 3 NestJS instance chạy trên host qua host.docker.internal
  # (EN: Upstream groups 3 NestJS instances via host.docker.internal)
  upstream nest_backend {
    # Thuật toán mặc định: round robin (EN: default algo: round robin)
    # Có thể đổi sang least_conn để cân theo connection (EN: switch to least_conn for least connections)
    # least_conn;

    server host.docker.internal:3001;
    server host.docker.internal:3002;
    server host.docker.internal:3003;
  }

  server {
    listen 80;

    location / {
      proxy_pass http://nest_backend;

      # Thêm header để debug backend nào đã phục vụ (EN: header to debug which backend served)
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Host $host;

      # Timeout để demo health-check tự động loại instance chết
      # (EN: timeout so that dead instances are excluded automatically)
      proxy_connect_timeout 2s;
      proxy_read_timeout 5s;
    }
  }
}
