# Nginx load balancer đứng trước 3 NestJS instance
# (EN: Nginx load balancer fronting 3 NestJS instances)
#
# Run command:
# docker compose -f .docker/nginx.yaml up --build -d

services:
  nginx:
    image: docker.io/nginx:1.27-alpine
    container_name: horizontal-scaling-nginx
    ports:
      - '8080:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      # Cho phép Nginx trong container gọi về các NestJS instance trên host
      # (EN: allow Nginx container to reach NestJS instances on host)
      - 'host.docker.internal:host-gateway'
