# Deployment users-app — 3 replica stateless
# (EN: users-app Deployment — 3 stateless replicas)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-app
  labels:
    app: users-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: users-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: users-app
    spec:
      containers:
        - name: users-app
          image: starci183/hsl-users-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
          # readinessProbe gate traffic — chìa khoá fail-over sạch
          # (EN: readinessProbe gates traffic — key to clean fail-over)
          readinessProbe:
            httpGet:
              path: /api/users/healthz
              port: 3001
            initialDelaySeconds: 3
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /api/users/healthz
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: users-service
spec:
  type: ClusterIP
  selector:
    app: users-app
  ports:
    - port: 3001
      targetPort: 3001

# Run command:
# kubectl apply -f users-app-deployment.yaml
