# Khai báo API version cho Service (EN: declare API version for Service resource)
apiVersion: v1
# Loại tài nguyên là Service — tạo DNS nội bộ cho Redis Pod (EN: resource type is Service — create internal DNS for Redis Pod)
kind: Service
metadata:
  # Tên Service — backend sẽ kết nối qua: redis-service.default.svc.cluster.local (EN: Service name — backend connects via: redis-service.default.svc.cluster.local)
  name: redis-service
spec:
  # ClusterIP (mặc định) — chỉ truy cập được từ bên trong cluster (EN: ClusterIP (default) — only accessible from inside the cluster)
  type: ClusterIP
  selector:
    # Selector khớp với label của Redis Pod (EN: selector matches Redis Pod labels)
    app: redis
  ports:
    - # Cổng Service map sang cổng Redis container (EN: Service port mapped to Redis container port)
      port: 6379
      targetPort: 6379

# Run command:
# kubectl apply -f redis-service.yaml
