version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: starci-jwt-auth-db
    environment:
      POSTGRES_USER: starci_user
      POSTGRES_PASSWORD: starci_password
      POSTGRES_DB: starci_db
    ports:
      - '5432:5432'
    restart: always

# Run command:
# docker compose -f .docker/postgresql.yaml up --build -d
